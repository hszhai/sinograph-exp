<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sinograF</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <header class="toolbar">
      <div class="toolbar-left">
        <button id="config-btn" type="button" class="icon-btn" title="Project settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <button id="load-btn" type="button" class="icon-btn" title="Open file">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 14l1.5-2.9A2 2 0 019.24 10H20a2 2 0 011.94 2.5l-1.54 6a2 2 0 01-1.95 1.5H4a2 2 0 01-2-2V5a2 2 0 012-2h3.9a2 2 0 011.69.9l.81 1.2a2 2 0 001.67.9H18a2 2 0 012 2v2"/>
          </svg>
        </button>
        <button id="save-btn" type="button" class="icon-btn" title="Save file">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15.2 3a2 2 0 011.4.6l3.8 3.8a2 2 0 01.6 1.4V19a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/>
            <path d="M17 21v-7a1 1 0 00-1-1H8a1 1 0 00-1 1v7"/>
            <path d="M7 3v4a1 1 0 001 1h7"/>
          </svg>
        </button>
        <input id="file-input" type="file" accept=".json" title="Load file" />
      </div>
      <div class="toolbar-center">
        <span class="toolbar-brand">sinograF</span>
      </div>
      <div class="toolbar-right">
        <button id="export-png-btn" type="button">PNG</button>
        <button id="export-svg-btn" type="button">SVG</button>
        <a href="./compose.html" class="toolbar-link">Compose &rarr;</a>
      </div>
    </header>

    <!-- Config popover (hidden by default) -->
    <div id="config-popover" class="config-popover hidden">
      <div class="config-row">
        <label class="config-label">Project</label>
        <select id="project-select" class="project-select" title="Active project"></select>
        <button id="project-new-btn" type="button" class="project-btn" title="New project">+</button>
        <button id="project-delete-btn" type="button" class="project-btn project-btn-danger" title="Delete project">&minus;</button>
      </div>
      <div class="config-row">
        <label class="config-label">Name</label>
        <input id="project-name-input" type="text" class="config-text-input" title="Project name" />
      </div>
      <div class="config-row">
        <label class="config-label">Work dir</label>
        <button id="workdir-btn" type="button" class="project-btn">choose…</button>
        <span id="workdir-label" class="config-dir-label">—</span>
      </div>
    </div>

    <div class="workspace">
      <div class="canvas-area">
        <div class="canvas-wrap">
          <canvas id="main-canvas" width="640" height="640"></canvas>
          <button id="reset-stroke-btn" type="button" class="canvas-float-btn reset-stroke-float" disabled>Reset stroke</button>
          <button id="reroll-btn" type="button" class="reroll-btn" title="Reroll seed">&#x21bb;</button>
        </div>
        <div class="stroke-bar" id="stroke-bar">
          <!-- stroke buttons injected by JS -->
        </div>
        <div class="variant-toggle" id="variant-toggle"></div>
        <div class="variant-bar" id="variant-bar">
          <!-- variant slots injected by JS -->
        </div>
        <div class="set-section">
          <div class="set-header">
            <h4>Set</h4>
            <button id="add-set-btn" type="button" class="set-tool-btn" title="Add new set">+</button>
            <button id="delete-set-btn" type="button" class="set-tool-btn set-tool-danger" title="Delete current set">&minus;</button>
            <button id="import-txt-btn" type="button" class="set-tool-btn" title="Import characters from text file">import text</button>
            <input id="txt-file-input" type="file" accept=".txt" title="Import text file" />
          </div>
          <div class="char-set" id="char-set">
            <!-- character set injected by JS -->
          </div>
        </div>
      </div>

      <aside class="panel">
        <div class="panel-section panel-char-input">
          <h4 class="section-label">Character</h4>
          <input id="char-input" type="text" maxlength="1" value="永" title="Character" />
        </div>
        <div class="panel-section">
          <div class="style-radios" id="p-style">
            <label class="style-radio"><input type="radio" name="style" value="calligraphic" checked /><span>Calligraphic</span></label>
            <label class="style-radio"><input type="radio" name="style" value="expressive" /><span>Expressive</span></label>
            <label class="style-radio"><input type="radio" name="style" value="brush" /><span>Brush</span></label>
            <label class="style-radio"><input type="radio" name="style" value="even" /><span>Even</span></label>
          </div>
          <label>Radius <input id="p-radius" type="range" min="2" max="80" step="0.5" value="30" /><input class="num-input" data-for="p-radius" type="number" /></label>
          <label>Taper <input id="p-taper" type="range" min="0" max="3" step="0.02" value="0.55" /><input class="num-input" data-for="p-taper" type="number" /></label>
          <label>Brush angle <input id="p-brushAngle" type="range" min="-180" max="180" step="1" value="-30" /><input class="num-input" data-for="p-brushAngle" type="number" /></label>
          <label>Angle var <input id="p-angleVar" type="range" min="0" max="180" step="1" value="0" /><input class="num-input" data-for="p-angleVar" type="number" /></label>
          <label>Tremor <input id="p-tremor" type="range" min="0" max="30" step="0.2" value="0" /><input class="num-input" data-for="p-tremor" type="number" /></label>
          <label>Jitter <input id="p-jitter" type="range" min="0" max="60" step="0.2" value="3" /><input class="num-input" data-for="p-jitter" type="number" /></label>
          <label>Warp <input id="p-warp" type="range" min="0" max="3" step="0.05" value="0" /><input class="num-input" data-for="p-warp" type="number" /></label>
          <label>Weight <input id="p-weightMul" type="range" min="0.3" max="2.5" step="0.02" value="1" /><input class="num-input" data-for="p-weightMul" type="number" /></label>
          <label>Ink level <input id="p-inkLevel" type="range" min="0.1" max="1" step="0.02" value="0.9" /><input class="num-input" data-for="p-inkLevel" type="number" /></label>
          <label>Asymmetry <input id="p-asymmetry" type="range" min="-1" max="1" step="0.02" value="0" /><input class="num-input" data-for="p-asymmetry" type="number" /></label>
          <label>Curvature wt <input id="p-curvatureWeight" type="range" min="0" max="5" step="0.05" value="0.5" /><input class="num-input" data-for="p-curvatureWeight" type="number" /></label>
          <label>Sample step <input id="p-sampleStep" type="range" min="1" max="50" step="0.5" value="5" /><input class="num-input" data-for="p-sampleStep" type="number" /></label>
          <label>Normal bias <input id="p-normalBias" type="range" min="-50" max="50" step="0.2" value="0" /><input class="num-input" data-for="p-normalBias" type="number" /></label>
          <label>Dryness <input id="p-dryness" type="range" min="0" max="1" step="0.02" value="0.12" /><input class="num-input" data-for="p-dryness" type="number" /></label>
          <label>Scale <input id="char-scale" type="range" min="0.85" max="1.15" step="0.01" value="1" /><input class="num-input" id="char-scale-num" type="number" step="0.01" /></label>
        </div>
        <div class="panel-section">
          <h4 class="section-label">Shape</h4>
          <label>Bow <input id="mm-bow" type="range" min="-0.3" max="0.3" step="0.005" value="0" /><input class="num-input" id="mm-bow-num" type="number" step="0.005" /></label>
          <label>Entry bend <input id="mm-entryBend" type="range" min="-30" max="30" step="0.5" value="0" /><input class="num-input" id="mm-entryBend-num" type="number" step="0.5" /></label>
          <label>Exit bend <input id="mm-exitBend" type="range" min="-30" max="30" step="0.5" value="0" /><input class="num-input" id="mm-exitBend-num" type="number" step="0.5" /></label>
          <label>Smoothness <input id="p-smoothness" type="range" min="0" max="1" step="0.02" value="0.45" /><input class="num-input" data-for="p-smoothness" type="number" /></label>
          <div class="stroke-range-row">
            <span class="stroke-range-label">Start</span>
            <input id="p-strokeStart" type="range" min="0" max="0.95" step="0.01" value="0" title="Stroke start" />
            <input id="p-strokeEnd" type="range" min="0.05" max="1" step="0.01" value="1" title="Stroke end" />
            <span class="stroke-range-label">End</span>
          </div>
        </div>

        <div class="panel-section">
          <div class="curve-header">
            <h3>Width curve</h3>
            <div class="curve-tools">
              <div class="curve-presets" id="width-presets"></div>
              <button id="smooth-width-btn" type="button" class="curve-tool-btn" title="Smooth">~</button>
            </div>
          </div>
          <canvas id="curve-canvas" width="260" height="120"></canvas>
        </div>

        <div class="panel-section">
          <div class="curve-header">
            <h3>Offset curve</h3>
            <button id="smooth-offset-btn" type="button" class="curve-tool-btn" title="Smooth">~</button>
          </div>
          <canvas id="offset-canvas" width="260" height="120"></canvas>
        </div>

        <div class="panel-section panel-bottom">
          <button id="reset-all-btn" type="button">Reset all</button>
        </div>
      </aside>
    </div>
  </main>

  <script type="module" src="./entry-design.js"></script>
</body>
</html>
